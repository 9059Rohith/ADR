name: SentinelArena CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  PNPM_VERSION: "9"

jobs:
  # ============================================================
  # Stage 1: Static Analysis
  # ============================================================
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: |
          pip install ruff mypy
          pip install -r services/api-gateway/requirements.txt
          pip install -r services/crowd-simulator/requirements.txt

      - name: ESLint
        run: pnpm lint

      - name: Prettier check
        run: pnpm format:check

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: Ruff lint (Python)
        run: ruff check services/

      - name: Ruff format check (Python)
        run: ruff format --check services/

      - name: mypy strict (Python)
        run: mypy --strict services/api-gateway/app services/crowd-simulator/app

  # ============================================================
  # Stage 2: Unit Tests
  # ============================================================
  unit-tests-ts:
    name: Unit Tests (TypeScript)
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: ts-coverage
          path: coverage/

  unit-tests-python:
    name: Unit Tests (Python)
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r services/api-gateway/requirements.txt
          pip install -r services/api-gateway/requirements-dev.txt
          pip install -r services/crowd-simulator/requirements.txt

      - name: Run tests with coverage
        run: |
          cd services/api-gateway
          pytest tests/unit --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=85

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: services/api-gateway/coverage.xml

  # ============================================================
  # Stage 3: Integration Tests
  # ============================================================
  integration-tests:
    name: Integration Tests
    needs: [unit-tests-ts, unit-tests-python]
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r services/api-gateway/requirements.txt
          pip install -r services/api-gateway/requirements-dev.txt

      - name: Run integration tests
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: sentinel_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test_secret_key_ci_only
          GROQ_API_KEY: test_key_ci
        run: |
          cd services/api-gateway
          pytest tests/integration -v

  # ============================================================
  # Stage 4: Build
  # ============================================================
  build:
    name: Build All
    needs: [unit-tests-ts, unit-tests-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

  # ============================================================
  # Stage 5: E2E + Accessibility
  # ============================================================
  e2e-tests:
    name: E2E & Accessibility Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Run accessibility tests
        run: pnpm test:a11y

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            playwright-report/
            test-results/

  # ============================================================
  # Stage 6: Security Scanning
  # ============================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pip install pip-audit

      - name: npm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: pip-audit
        run: |
          pip-audit -r services/api-gateway/requirements.txt
        continue-on-error: true
